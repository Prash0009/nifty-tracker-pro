name: NIFTY 5m Option Signals

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 3-10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NIFTY signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python nifty_pro_tracker.py --once

      - name: Commit tracker state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tracker_state.json
          if git diff --cached --quiet; then
            echo "No tracker state changes to commit."
            exit 0
          fi
          git commit -m "chore: update tracker state [skip ci]"
          git push
